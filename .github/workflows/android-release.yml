name: Android Release Build and Upload

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 --decode > ./app/release-signing.jks

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_FILE: 'release-signing.jks'
        run: |
          ./gradlew assembleRelease --no-daemon --no-build-cache --no-configuration-cache

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: 'app/build/outputs/apk/api*/release/ShareFix-api*-release.apk'

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v3
        with:
          files: 'app/build/outputs/apk/api*/release/ShareFix-api*-release.apk'
          draft: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true
          draft: false
